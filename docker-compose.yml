# Local dev environment. Mirrors the eventual Proxmox deployment so moving
# over is a host change, not an architecture change.
services:
  db:
    image: timescale/timescaledb:2.15.0-pg16
    environment:
      POSTGRES_DB: adp
      POSTGRES_USER: adp
      POSTGRES_PASSWORD: adp
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adp"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  prefect:
    image: prefecthq/prefect:3-python3.11
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_URL: http://localhost:4200/api
    ports: ["4200:4200"]
    depends_on: [db]

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      ADP_PG_HOST: db
      ADP_S3_ENDPOINT_URL: http://minio:9000
    ports: ["8000:8000"]
    depends_on:
      db: {condition: service_healthy}
      minio: {condition: service_healthy}

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    ports: ["3000:3000"]
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on: [db]

volumes:
  pgdata:
  miniodata:
